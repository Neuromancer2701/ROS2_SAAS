# Nginx configuration for serving the React frontend and proxying API requests.

# Upstream server for the Node.js backend API
# This assumes your Node.js backend runs on port 3000 inside the Docker container
# or on the droplet.
upstream nodejs_backend {
    server 127.0.0.1:3000; # Adjust if your Node.js app runs on a different port/host
    keepalive 64;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    # Adjust server_name if you have a domain, otherwise localhost or IP is fine.
    server_name _; # Catches all hostnames

    # Path to the React frontend's static files (e.g., index.html from ros2-front-end)
    # This path should correspond to where you copy/mount the frontend files in the Docker container
    # or on the droplet. Example: /opt/ros2_saas_app/frontend
    root /opt/ros2_saas_app/frontend; # Dockerfile sets APP_ROOT=/opt/ros2_saas_app
    index index.html index.htm;

    # Standard location block for serving static files
    location / {
        try_files $uri $uri/ /index.html; # For single-page applications (SPA) like React
    }

    # API endpoint proxy
    # All requests to /api/... will be forwarded to the Node.js backend
    location /api/ {
        proxy_pass http://nodejs_backend; # Matches upstream block name
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 200; # Increase if API calls are long
        proxy_connect_timeout 75;
    }

    # Optional: WebSocket proxying if your Node.js backend uses WebSockets (e.g., for rosbridge)
    # location /websocket/ {
    #     proxy_pass http://nodejs_backend; # Or your rosbridge server URL
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $host;
    # }

    # Optional: Security headers
    # add_header X-Frame-Options "SAMEORIGIN";
    # add_header X-Content-Type-Options "nosniff";
    # add_header X-XSS-Protection "1; mode=block";
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Optional: SSL/TLS configuration (HTTPS)
    # This requires SSL certificates. For DigitalOcean, you can use Let's Encrypt.
    # The setup_droplet.sh script could include certbot for this.
    # listen 443 ssl http2 default_server;
    # listen [::]:443 ssl http2 default_server;
    # ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem; # Path to your cert
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem; # Path to your key
    # include /etc/letsencrypt/options-ssl-nginx.conf; # Recommended SSL options
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # Diffie-Hellman params

    # Optional: Redirect HTTP to HTTPS
    # if ($scheme != "https") {
    #     return 301 https://$host$request_uri;
    # }

    # Logging
    access_log /var/log/nginx/app_access.log;
    error_log /var/log/nginx/app_error.log;

    # Basic error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html; # Default Nginx error page location
    }

    # Prevent Nginx from serving dotfiles (.git, .htaccess, etc.)
    location ~ /\. {
        deny all;
    }
}
```

This `nginx.conf`:
-   Sets up an upstream block for a Node.js backend assumed to be running on `127.0.0.1:3000`.
-   Listens on port 80.
-   Serves static files from `/opt/ros2_saas_app/frontend`, with `index.html` as the entry point (suitable for SPAs).
-   Proxies requests starting with `/api/` to the Node.js backend.
-   Includes commented-out sections for WebSocket proxying and SSL/TLS configuration (which would typically involve Let's Encrypt on a live server).
-   Sets up basic logging and error pages.
-   Denies access to dotfiles.

This configuration file will be copied into the Docker image or placed on the droplet by the `setup_droplet.sh` script. The paths assume the directory structure defined in the `Dockerfile` (`APP_ROOT=/opt/ros2_saas_app`).
